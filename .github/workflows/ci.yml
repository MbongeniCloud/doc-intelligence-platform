name: CI — Doc Intelligence Platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/test_units.py tests/test_scrubber.py -v

      - name: Check test coverage
        run: python -m pytest tests/test_units.py tests/test_scrubber.py --cov=src --cov-report=term-missing

  validate-infra:
    name: Validate Bicep
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate Bicep
        run: |
          az deployment group validate \
            --resource-group dociq-rg-dev \
            --template-file infra/main.bicep \
            --parameters infra/parameters.dev.json